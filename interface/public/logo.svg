<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 250" width="100%" height="100%" fill="none">
  <defs>
    <!-- Primary Blue/Indigo Face Gradient -->
    <linearGradient id="columnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#494BD6" />
      <stop offset="100%" stop-color="#1B1B29" />
    </linearGradient>

    <!-- Top Cap Highlight Gradient -->
    <linearGradient id="topCapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C1FF" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>

    <!-- Low Accent Top Cap Gradient -->
    <linearGradient id="lowCapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8083FF" />
      <stop offset="100%" stop-color="#393841" />
    </linearGradient>
  </defs>

  <!-- ISOMETRIC COLUMN MARK -->
  <g transform="translate(-15, -15)">
    <!-- === LEFT OUTER COLUMN (LOW) === -->
    <!-- Left Face -->
    <path d="M 40 180 L 40 240 L 92 270 L 92 210 Z" fill="#1F1F27" opacity="0.8" />
    <!-- Right Face -->
    <path d="M 92 210 L 92 270 L 144 240 L 144 180 Z" fill="url(#columnGrad)" />
    <!-- Top Cap -->
    <path d="M 92 150 L 144 180 L 92 210 L 40 180 Z" fill="url(#lowCapGrad)" />
    <!-- Light Trim Outlines -->
    <path d="M 92 150 L 40 180 L 40 240 M 92 150 L 144 180 L 144 240 M 92 150 L 92 210" stroke="#C0C1FF" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"/>

    <!-- === LEFT INNER COLUMN (MEDIUM) === -->
    <!-- Left Face -->
    <path d="M 92 120 L 92 210 L 144 240 L 144 150 Z" fill="#1F1F27" opacity="0.9" />
    <!-- Right Face -->
    <path d="M 144 150 L 144 240 L 196 210 L 196 120 Z" fill="url(#columnGrad)" />
    <!-- Top Cap -->
    <path d="M 144 90 L 196 120 L 144 150 L 92 120 Z" fill="url(#columnGrad)" />
    <!-- Light Trim Outlines -->
    <path d="M 144 90 L 92 120 L 92 210 M 144 90 L 196 120 L 196 210 M 144 90 L 144 150" stroke="#C0C1FF" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.75"/>

    <!-- === RIGHT OUTER COLUMN (LOW) === -->
    <!-- Left Face -->
    <path d="M 248 180 L 248 240 L 300 270 L 300 210 Z" fill="#1F1F27" opacity="0.8" />
    <!-- Right Face -->
    <path d="M 300 210 L 300 270 L 352 240 L 352 180 Z" fill="url(#columnGrad)" />
    <!-- Top Cap -->
    <path d="M 300 150 L 352 180 L 300 210 L 248 180 Z" fill="url(#lowCapGrad)" />
    <!-- Light Trim Outlines -->
    <path d="M 300 150 L 248 180 L 248 240 M 300 150 L 352 180 L 352 240 M 300 150 L 300 210" stroke="#C0C1FF" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"/>

    <!-- === RIGHT INNER COLUMN (MEDIUM) === -->
    <!-- Left Face -->
    <path d="M 196 120 L 196 210 L 248 240 L 248 150 Z" fill="#1F1F27" opacity="0.9" />
    <!-- Right Face -->
    <path d="M 248 150 L 248 240 L 300 210 L 300 120 Z" fill="url(#columnGrad)" />
    <!-- Top Cap -->
    <path d="M 248 90 L 300 120 L 248 150 L 196 120 Z" fill="url(#columnGrad)" />
    <!-- Light Trim Outlines -->
    <path d="M 248 90 L 196 120 L 196 210 M 248 90 L 300 120 L 300 210 M 248 90 L 248 150" stroke="#C0C1FF" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.75"/>

    <!-- === CENTER FOREGROUND DEPTH ANCHOR (LOWEST CENTER) === -->
    <!-- Top Cap only -->
    <path d="M 196 210 L 248 240 L 196 270 L 144 240 Z" fill="#34343D" />
    <path d="M 196 210 L 144 240 L 196 270 L 248 240 Z" stroke="#C0C1FF" stroke-width="2" stroke-linejoin="round" opacity="0.4"/>

    <!-- === CENTER TALL COLUMN (HIGHEST) === -->
    <!-- Left Face -->
    <path d="M 144 60 L 144 180 L 196 210 L 196 90 Z" fill="#13131B" />
    <!-- Right Face -->
    <path d="M 196 90 L 196 210 L 248 180 L 248 60 Z" fill="url(#columnGrad)" />
    <!-- Top Cap -->
    <path d="M 196 30 L 248 60 L 196 90 L 144 60 Z" fill="url(#topCapGrad)" />
    <!-- Main Structural Bright Highlight Outlines -->
    <path d="M 196 30 L 144 60 L 144 180 M 196 30 L 248 60 L 248 180 M 196 30 L 196 210" stroke="#C0C1FF" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round" />
  </g>
</svg>
