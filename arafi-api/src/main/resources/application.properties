# ====================================================================
# ARAFI API - UNIFIED CONFIGURATION PROFILE (LOCAL & PRODUCTION)
# ====================================================================
spring.application.name=arafi-api

# Server Execution Port Configuration
# Cloud Run automatically injects the variable 'PORT'. Locally, it boots on 8080.
server.port=${PORT:8080}

# ====================================================================
# DATABASE CONNECTIVITY LAYER (POSTGRESQL / NEON)
# ====================================================================
# If SPRING_DATASOURCE_URL is present, it uses it. Otherwise, it defaults to your local database.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/arafi?options=-c%20search_path%3Darafi}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Transaction Mapping Schema Metrics
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=arafi
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Hikari Connection Pool Scaling Optimizations
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ====================================================================
# PLATFORM SECURITY & TOKENS
# ====================================================================
# Stateless JWT Signature Verification Secret Key
# ALWAYS pass a massive, secure token in your live environment variable.
arafi.jwt.secret=${ARAFI_JWT_SECRET}

# ====================================================================
# INTERACTIVE PLATFORM DOCUMENTATION (SWAGGER / OPENAPI)
# ====================================================================
springdoc.api-docs.path=/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

spring.profiles.active = test

